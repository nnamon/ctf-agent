name: sandbox build

# Builds the ctf-sandbox image, smoke-tests it on the native runner arch
# (amd64), then pushes a multi-arch (amd64 + arm64) image to Docker Hub.
#
# Triggered when sandbox-related files change OR via manual dispatch.
# Keeps PRs cheap by skipping unrelated commits.

on:
  push:
    branches: [main]
    paths:
      - 'sandbox/**'
      - '.github/workflows/sandbox-build.yml'
  pull_request:
    paths:
      - 'sandbox/**'
      - '.github/workflows/sandbox-build.yml'
  workflow_dispatch:

env:
  IMAGE: nnamon/ctf-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Free ~25 GB on the runner — our image hits 30 GB uncompressed and
      # default GitHub free runners only ship with ~14 GB free. Removes
      # pre-installed Android SDK, .NET, Haskell, etc. that we don't need.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false  # keeps apt repos working
          docker-images: false   # we're about to use docker
          swap-storage: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Login is needed for both pull (cache base layers) and push.
      # Skip on PRs since they can't read the secret.
      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Phase 1: build amd64 only, load locally, smoke-test it.
      # Using a single-arch build for the smoke means we can `docker run`
      # without QEMU emulation lag.
      - name: Build amd64 (for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sandbox/Dockerfile.sandbox
          platforms: linux/amd64
          load: true
          tags: ctf-sandbox:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker tag ctf-sandbox:smoke ctf-sandbox:latest
          ./sandbox/build.sh --no-build

      # Phase 2: multi-arch build + push (only on main / manual run).
      # Cache hits make the amd64 portion near-instant since phase 1
      # already populated the gha cache backend.
      - name: Build multi-arch & push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sandbox/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
