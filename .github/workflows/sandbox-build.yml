name: sandbox build

# Builds the ctf-sandbox image on native runners per arch (no QEMU
# emulation), smoke-tests each arch on its own runner, then merges
# the per-arch digests into a single multi-arch manifest.
#
# Why split: the previous "build linux/amd64,linux/arm64 in one
# buildx step on ubuntu-latest" took >6h because the arm64 portion
# was emulated under QEMU. GitHub now offers free ubuntu-24.04-arm
# runners for public repos, so each arch builds in ~30 min natively
# and they run in parallel.

on:
  push:
    branches: [main]
    paths:
      - 'sandbox/**'
      - '.github/workflows/sandbox-build.yml'
  pull_request:
    paths:
      - 'sandbox/**'
      - '.github/workflows/sandbox-build.yml'
  workflow_dispatch:

env:
  IMAGE: nnamon/ctf-agent
  VPN_IMAGE: nnamon/ctf-vpn

jobs:
  # One matrix arm per (image, architecture). Each runs on a NATIVE
  # runner so the build is CPU-bound, not QEMU-bound. ctf-vpn is the
  # thin alpine+openvpn sidecar used by HtbMachinesBackend; tiny enough
  # (~12 MB) that the extra build time is negligible alongside ctf-sandbox.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sandbox
            dockerfile: sandbox/Dockerfile.sandbox
            image_ref: nnamon/ctf-agent
            local_tag: ctf-sandbox
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - image: sandbox
            dockerfile: sandbox/Dockerfile.sandbox
            image_ref: nnamon/ctf-agent
            local_tag: ctf-sandbox
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - image: vpn
            dockerfile: sandbox/Dockerfile.vpn
            image_ref: nnamon/ctf-vpn
            local_tag: ctf-vpn
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - image: vpn
            dockerfile: sandbox/Dockerfile.vpn
            image_ref: nnamon/ctf-vpn
            local_tag: ctf-vpn
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Free ~25 GB on the runner — our image hits 30 GB uncompressed
      # and default GitHub free runners only ship with ~14 GB free.
      # Keeps apt repos working and the docker daemon intact.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build single-arch (native — no QEMU). Load locally so smoke can
      # `docker run` against it; also push by-digest below for the merge.
      - name: Build (${{ matrix.image }}/${{ matrix.arch }}, native)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ matrix.local_tag }}:smoke
          # Per (image, arch) cache scope — independent lanes per pair.
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Smoke test (${{ matrix.image }}/${{ matrix.arch }})
        run: |
          docker tag ${{ matrix.local_tag }}:smoke ${{ matrix.local_tag }}:latest
          if [ "${{ matrix.image }}" = "sandbox" ]; then
            ./sandbox/build.sh --no-build
          else
            # ctf-vpn sidecar: confirm openvpn binary present + reports
            # a version. Anything beyond a help-string check would need
            # NET_ADMIN cap which we can't reasonably grant in CI.
            docker run --rm ${{ matrix.local_tag }}:latest openvpn --version | head -1
          fi

      # Push by-digest so the final job can merge per-arch digests into
      # a single manifest. The digest is content-addressable and
      # arch-tagged via the `index` API on docker buildx imagetools.
      - name: Push by digest (${{ matrix.image }}/${{ matrix.arch }})
        id: push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ matrix.image_ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Export digest
        id: digest
        if: steps.push.outcome == 'success'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          echo "${{ matrix.arch }}=${digest}" >> "$GITHUB_OUTPUT"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: steps.push.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Merge per-arch digests into one multi-arch manifest per image. Each
  # image gets :latest and :<sha> tags. Cheap (no rebuild) — composes
  # manifest lists from already-pushed by-digest images.
  merge:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: sandbox
            image_ref: nnamon/ctf-agent
            artifact_prefix: digest-sandbox-
          - image: vpn
            image_ref: nnamon/ctf-vpn
            artifact_prefix: digest-vpn-
    steps:
      - name: Download digests for ${{ matrix.image }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: ${{ matrix.artifact_prefix }}*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push (${{ matrix.image }})
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.image_ref }}:latest \
            -t ${{ matrix.image_ref }}:${{ github.sha }} \
            $(printf '${{ matrix.image_ref }}@sha256:%s ' *)

      - name: Inspect resulting image (${{ matrix.image }})
        run: docker buildx imagetools inspect ${{ matrix.image_ref }}:latest
